const eur0 = n => '€\u00a0' + Math.round(n).toLocaleString('nl-NL');
const dnl = s => s? s.split('-').reverse().join('-') : '';
const S = D.summary;
document.getElementById('peil').textContent = dnl(S.peildatum);

// KPI
const kpis = [
  {lab:'Totaal openstaand',val:eur(S.totaal),sub:S.regels+' posten · '+S.debiteuren+' debiteuren',cls:'accent'},
  {lab:'Niet vervallen',val:eur(S.nietvervallen_bedrag),sub:'binnen betaaltermijn'},
  {lab:'Vervallen',val:eur(S.vervallen_bedrag),sub:S.vervallen_regels+' posten over termijn',cls:'warn'},

];

  `<div class=&quot;kpi ${k.cls||''}&quot;><div class=&quot;lab&quot;>${k.lab}</div><div class=&quot;val num&quot;>${k.val}</div><div class=&quot;sub&quot;>${k.sub}</div></div>`).join('');

// aging buckets
const order=['Niet vervallen','1-30 dagen','31-60 dagen','61-90 dagen','90+ dagen'];
const colors={'Niet vervallen':'#1565b0','1-30 dagen':'#3f8fd6','31-60 dagen':'#f0a35a','61-90 dagen':'#FE6F22','90+ dagen':'#d84141'};
const agg={}; order.forEach(b=>agg[b]={sum:0,cnt:0});
D.records.forEach(r=>{agg[r.bucket].sum+=r.openstaand;agg[r.bucket].cnt++;});

new Chart(document.getElementById('agingChart'),{
  type:'bar',
  data:{labels:order.map(b=>b+' ('+agg[b].cnt+')'),
    datasets:[{data:order.map(b=>Math.round(agg[b].sum)),
      backgroundColor:order.map(b=>colors[b]),borderRadius:6,maxBarThickness:30}]},
  options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>eur(c.raw)}}},
    scales:{x:{ticks:{callback:v=>eur0(v),font:{size:11}},grid:{color:'#eef1f5'}},
      y:{ticks:{font:{size:11.5}},grid:{display:false}}}}
});

 <li><b>Oudste post:</b> ${oldest?oldest.debiteur+' — factuur '+oldest.factuur+', '+oldest.dagen+' dagen vervallen (vervaldatum '+dnl(oldest.vervaldatum)+').':'—'} Daarnaast staan o.a. TN Plastics, Spie Nederland en Van Spijker Infrabouw ruim 100+ dagen open.</li>
 <li><b>Dubbel geboekt factuurnummer:</b> ${dupTxt||'geen'}. Bij Kneppers leidt dit tot een netto <b>creditsaldo van ${eur(negDeb[0]?negDeb[0].saldo:0)}</b> — waarschijnlijk een creditnota (05239D1/D2) die naast de herfacturatie (06264) is blijven staan. Uitzoeken en afboeken.</li>
 <li><b>Overbetalingen:</b> Verkley B.V (06238) en Spie Nederland (05659) zijn méér betaald dan gefactureerd; samen met Grondwerk &amp;amp; Kraanverhuur leveren ze negatieve regels op die met openstaande facturen verrekend kunnen worden.</li>
 <li><b>Verkley B.V:</b> veel kleine losse posten, waarvan een groot deel net vervallen — kandidaat voor een gebundelde herinnering.</li>
</ul>`;

// ---- Aanmaningsvoorstel ----
const byDeb={};
D.records.forEach(r=>{(byDeb[r.debnr]=byDeb[r.debnr]||{debnr:r.debnr,naam:r.debiteur,items:[]}).items.push(r);});
function lvlOf(d){ if(d>90)return{n:'Laatste sommatie',c:'l4'}; if(d>60)return{n:'Aanmaning',c:'l3'};
  if(d>30)return{n:'2e herinnering',c:'l2'}; return{n:'1e herinnering',c:'l1'};}
const voorstellen=Object.values(byDeb).map(g=>{
  const overdue=g.items.filter(i=>i.vervallen);
  const netOverdue=overdue.reduce((s,i)=>s+i.openstaand,0);
  const netTotal=g.items.reduce((s,i)=>s+i.openstaand,0);
  const credit=overdue.filter(i=>i.openstaand<0).reduce((s,i)=>s+i.openstaand,0);
  const maxD=overdue.length?Math.max(...overdue.map(i=>i.dagen)):0;
  return {...g,overdue,netOverdue,netTotal,credit,maxD,intercompany:/AAB/i.test(g.naam)};
}).filter(g=>g.netOverdue>0.01).sort((a,b)=>b.netOverdue-a.netOverdue);

document.getElementById('aanCount').textContent=voorstellen.length;
document.getElementById('aanSom').textContent=eur(voorstellen.reduce((s,g)=>s+g.netOverdue,0));
document.getElementById('aanFac').textContent=voorstellen.reduce((s,g)=>s+g.overdue.filter(i=>i.openstaand>0.005).length,0);

function reminderText(g){
  const lv=lvlOf(g.maxD);
  const lines=g.overdue.filter(i=>i.openstaand>0.005).sort((a,b)=>b.dagen-a.dagen)
    .map(i=>`  \u2022 Factuur ${i.factuur} d.d. ${dnl(i.factuurdatum)} \u2014 vervaldatum ${dnl(i.vervaldatum)} \u2014 ${eur(i.openstaand)}`).join('\n');
  const creditLine=g.credit<-0.005?`\n  \u2022 Af: reeds ontvangen / creditsaldo \u2014 ${eur(g.credit)}`:'';
  const tot=eur(g.netOverdue);
  let kop,slot;
  if(lv.c==='l1'){kop='Wellicht is het aan uw aandacht ontsnapt, maar van de onderstaande factu(u)r(en) is de vervaldatum inmiddels verstreken:';
    slot=`Mogelijk heeft uw betaling zich met deze herinnering gekruist. Is dat niet het geval, dan verzoeken wij u vriendelijk het openstaande bedrag van ${tot} binnen 14 dagen aan ons over te maken.`;}
  else if(lv.c==='l2'){kop='Ondanks onze eerdere herinnering staan de volgende facturen nog open:';
    slot=`Wij verzoeken u het totaalbedrag van ${tot} binnen 7 dagen te voldoen.`;}
  else if(lv.c==='l3'){kop='Tot op heden hebben wij voor de onderstaande facturen geen betaling mogen ontvangen:';
    slot=`Wij sommeren u het openstaande bedrag van ${tot} binnen 7 dagen te voldoen. Bij uitblijven van betaling zien wij ons genoodzaakt verdere maatregelen te treffen.`;}
  else {kop='Ondanks herhaald verzoek is het onderstaande bedrag nog altijd niet voldaan:';
    slot=`Wij stellen u hierbij in gebreke en verzoeken \u2014 voor zover nodig sommeren \u2014 u het bedrag van ${tot} binnen 5 dagen te voldoen. Bij gebreke daarvan dragen wij de vordering over ter incasso, waarbij de bijkomende kosten en de wettelijke (handels)rente voor uw rekening komen.`;}
  return `Geachte heer/mevrouw,\n\n${kop}\n\n${lines}${creditLine}\n\nTotaal openstaand: ${tot}\n\n${slot}\n\nMet vriendelijke groet,`;
}

document.getElementById('aanList').innerHTML=voorstellen.map((g,ix)=>{
  const lv=lvlOf(g.maxD);
  const det=g.items.slice().sort((a,b)=>(b.dagen??-1e9)-(a.dagen??-1e9)).map(i=>
    `<tr><td>${i.factuur}</td><td>${dnl(i.factuurdatum)}</td><td>${dnl(i.vervaldatum)}</td>
     <td class=&quot;n ${i.vervallen?'od':''}&quot;>${i.vervallen?i.dagen:'<span style=&quot;color:#9aa5b1&quot;>'+i.dagen+'</span>'}</td>
     <td class=&quot;n ${i.openstaand<0?'neg':''}&quot;>${eur(i.openstaand)}</td>
     <td>${i.vervallen?'<span class=&quot;badge v60&quot;>vervallen</span>':'<span class=&quot;badge ok&quot;>binnen termijn</span>'}</td></tr>`).join('');
  return `<div class=&quot;aanrow&quot; id=&quot;aan${ix}&quot;>
    <div class=&quot;aanhead&quot; onclick=&quot;toggleAan(${ix})&quot;>
      <div><span class=&quot;nm&quot;>${g.naam}</span>${g.intercompany?'<span class=&quot;ic&quot;>intercompany</span>':''}
        <div class=&quot;sub&quot;>#${g.debnr} \u00b7 ${g.overdue.filter(i=>i.openstaand>0.005).length} vervallen factu(u)r(en)</div></div>
      <div class=&quot;col-lvl&quot;><span class=&quot;lvl ${lv.c}&quot;>${lv.n}</span></div>
      <div class=&quot;sub&quot;>oudste<br>${g.maxD} dgn</div>
      <div class=&quot;amt&quot;>${eur(g.netOverdue)}<div class=&quot;sub&quot; style=&quot;font-weight:500&quot;>te vorderen</div></div>
      <div class=&quot;sub&quot;>open totaal<br><b style=&quot;color:var(--ink)&quot;>${eur(g.netTotal)}</b></div>
      <div class=&quot;chev&quot;>\u25b6</div>
    </div>
    <div class=&quot;aandet&quot;>
      <table><thead><tr><th>Factuur</th><th>Factuurdatum</th><th>Vervaldatum</th>
        <th class=&quot;n&quot;>Dagen</th><th class=&quot;n&quot;>Openstaand</th><th>Status</th></tr></thead>
        <tbody>${det}</tbody>
        <tfoot><tr><td colspan=&quot;4&quot;>Totaal openstaand bij deze debiteur</td>
          <td class=&quot;n&quot;>${eur(g.netTotal)}</td><td>${eur(g.netOverdue)} vervallen</td></tr></tfoot>
      </table>
      <div class=&quot;remind&quot;>
        <textarea id=&quot;rt${ix}&quot; readonly></textarea>
        <button class=&quot;copybtn&quot; onclick=&quot;copyRem(${ix},this)&quot;>Kopieer herinnering</button>
      </div>
    </div></div>`;
}).join('');
voorstellen.forEach((g,ix)=>{const ta=document.getElementById('rt'+ix);if(ta)ta.value=reminderText(g);});
window.toggleAan=ix=>document.getElementById('aan'+ix).classList.toggle('open');
window.copyRem=(ix,btn)=>{const ta=document.getElementById('rt'+ix);ta.focus();ta.select();
  const done=()=>{btn.textContent='Gekopieerd \u2713';btn.classList.add('done');
    setTimeout(()=>{btn.textContent='Kopieer herinnering';btn.classList.remove('done');},1700);};
  try{if(navigator.clipboard&amp;&amp;navigator.clipboard.writeText){navigator.clipboard.writeText(ta.value).then(done,()=>{document.execCommand('copy');done();});}
    else{document.execCommand('copy');done();}}catch(e){document.execCommand('copy');done();}};

// table
let rows=[...D.records]; let sortK='openstaand',sortDir=-1;
const tbody=document.getElementById('tbody');
const badge=r=>{ if(!r.vervallen) return '<span class=&quot;badge ok&quot;>Niet vervallen</span>';
  const d=r.dagen; if(d>90)return '<span class=&quot;badge v90&quot;>90+ d</span>';
  if(d>60)return '<span class=&quot;badge v60&quot;>61–90 d</span>';
  if(d>30)return '<span class=&quot;badge v60&quot;>31–60 d</span>';
  return '<span class=&quot;badge v30&quot;>1–30 d</span>';};
function render(){
  const q=document.getElementById('q').value.toLowerCase().trim();
  const fb=document.getElementById('fbucket').value;
  const ff=document.getElementById('fflag').value;
  let r=rows.filter(x=>{
    if(q &amp;&amp; !(x.debiteur.toLowerCase().includes(q)||x.factuur.toLowerCase().includes(q)))return false;
    if(fb &amp;&amp; x.bucket!==fb)return false;
    if(ff==='verv'&amp;&amp;!x.vervallen)return false;
    if(ff==='neg'&amp;&amp;!(x.openstaand<-0.005))return false;
    if(ff==='deel'&amp;&amp;!(x.betaald>0.005))return false;
    return true;});
  r.sort((a,b)=>{let va=a[sortK],vb=b[sortK];
    if(typeof va==='string'){va=va||'';vb=vb||'';return sortDir*va.localeCompare(vb,'nl');}
    va=va??-1e15;vb=vb??-1e15;return sortDir*(va-vb);});
  tbody.innerHTML=r.map(x=>`<tr>
    <td>${x.debiteur}</td><td>${x.factuur}</td><td>${dnl(x.factuurdatum)}</td>
    <td class=&quot;n&quot;>${eur(x.factuurbedrag)}</td>
    <td class=&quot;n&quot;>${x.betaald?eur(x.betaald):'—'}</td>
    <td class=&quot;n ${x.openstaand<0?'neg':''}&quot;>${eur(x.openstaand)}</td>
    <td>${dnl(x.vervaldatum)}</td>
    <td class=&quot;n&quot;>${x.vervallen?x.dagen:'<span style=&quot;color:#9aa5b1&quot;>'+x.dagen+'</span>'}</td>
    <td>${badge(x)}</td></tr>`).join('');
  document.getElementById('rowcount').textContent=r.length+' van '+rows.length+' posten · '+eur(r.reduce((s,x)=>s+x.openstaand,0));
}
document.querySelectorAll('#tbl thead th').forEach(th=>{
  th.addEventListener('click',()=>{const k=th.dataset.k;
    if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=(k==='debiteur'||k==='factuur'||k==='bucket')?1:-1;}
    document.querySelectorAll('#tbl thead th .ar').forEach(a=>a.textContent='');
    th.querySelector('.ar').textContent=sortDir>0?'▲':'▼';render();});
});
['q','fbucket','fflag'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.querySelector('#tbl thead th[data-k=&quot;openstaand&quot;] .ar').textContent='▼';
render();
</script>

body{margin:0;background:var(--bg);color:var(--ink);font-family:&quot;Inter&quot;,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,Roboto,Arial,sans-serif;font-feature-settings:&quot;tnum&quot; 1;line-height:1.45}

.brandrow{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;z-index:1}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:-44px 0 22px;position:relative;z-index:2}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px 16px;box-shadow:0 6px 20px -14px rgba(1,42,85,.45)}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 4px 16px -14px rgba(1,42,85,.35);margin-bottom:20px}

.card .hint{font-size:12px;color:var(--muted);margin:0 0 14px}
table.aang{width:100%;border-collapse:collapse;font-size:13px}

table.aang th.l{text-align:left;border-top-left-radius:8px} table.aang th.j{background:var(--orange);border-top-right-radius:8px}
table.aang td{padding:8px 11px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
table.aang td.l{text-align:left} table.aang td.code{color:var(--muted);font-weight:700;width:34px;text-align:left}
table.aang tr.btw td{font-weight:700;color:var(--navy)}
table.aang tr.hl td{font-weight:700;color:var(--navy);background:#f7fafd}
table.aang tr.saldo td{font-weight:750;border-top:2px solid var(--navy);border-bottom:2px solid var(--navy);background:#f3f7fc}
table.aang td.jcol{background:#fff7f1;font-weight:700}
.pos{color:var(--red)} .neg{color:var(--green)}
/* controles */
table.ctl{width:100%;border-collapse:collapse;font-size:12.5px}
table.ctl th{background:#f7f9fc;text-align:right;padding:9px 10px;color:var(--navy);font-weight:700;border-bottom:2px solid var(--line)}
table.ctl th.l{text-align:left} table.ctl td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}

.ctl .ttl{font-weight:700;color:var(--navy)} .ctl .uit{font-size:11px;color:var(--muted)}
.flag{background:var(--red-soft)!important;color:var(--red);font-weight:700}
.okc{color:var(--green);font-weight:700}

.badge.ok{background:var(--green-soft);color:var(--green)} .badge.no{background:var(--red-soft);color:var(--red)}
table.bron{width:100%;border-collapse:collapse;font-size:12.5px}

table.bron thead th.l{text-align:left} table.bron td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
table.bron td.l{text-align:left} table.bron tbody tr:hover{background:#f6f9fd}
.rek{display:inline-block;font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;background:#e7f0fb;color:var(--navy)}
.note{background:#fff0e6;border:1px solid #ffd9bf;border-radius:12px;padding:14px 16px;font-size:13px}

@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr);margin-top:18px}}
</style>
</head>

  h+=`<tr class=&quot;${cls}&quot;><td class=&quot;code&quot;>${r.code}</td><td class=&quot;l&quot;>${r.lbl}</td>${cells}<td class=&quot;jcol ${jc}&quot;>${r.jaar?eur(r.jaar):'–'}</td></tr>`;

const eur=n=>(n<0?'-':'')+'\u20ac\u00a0'+Math.abs(n).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2});
const eur0=n=>(n<0?'-':'')+'\u20ac\u00a0'+Math.abs(Math.round(n)).toLocaleString('nl-NL');

const P=D.vpb;
function vpb(w){if(w<=0)return{laag:0,hoog:0,tot:0};const laag=Math.min(w,P.grens)*P.laag;const hoog=Math.max(w-P.grens,0)*P.hoog;return{laag,hoog,tot:laag+hoog};}

].join('');

function row(cls,label,q,jaar,gid){

  const chev=gid!==undefined?'<span class=&quot;chev&quot;>▶</span> ':'';
  return `<tr class=&quot;${cls}&quot; ${gid!==undefined?`onclick=&quot;tg('${gid}')&quot; id=&quot;g_${gid}&quot;`:''}><td class=&quot;l&quot;>${chev}${label}</td>${cells}<td class=&quot;jcol ${jaar<0?'neg':''}&quot;>${jaar?eur(jaar):'–'}</td></tr>`;
}
function detrows(gid,detail){
  return detail.map(d=>{
    const cells=[1,2,3,4].map(k=>{const v=d.q[String(k)];return `<td class=&quot;${v<0?'neg':''}&quot;>${v?eur(v):'–'}</td>`;}).join('');
    return `<tr class=&quot;det d_${gid}&quot;><td class=&quot;l&quot;>${d.rek} · ${d.naam}</td>${cells}<td class=&quot;${d.jaar<0?'neg':''}&quot;>${d.jaar?eur(d.jaar):'–'}</td></tr>`;
  }).join('');
}
let gi=0;
function emit(g){const id='x'+(gi++);h+=row('grp',g.label,g.q,g.jaar,id)+detrows(id,g.detail);}
D.groups.filter(g=>g.kind==='omzet').forEach(emit);

  document.querySelectorAll('.d_'+id).forEach(e=>e.classList.toggle('show'));};

// VPB
function vpbCard(titel,winstlbl,w,proj){
  const v=vpb(w); const eff=w>0?(v.tot/w*100):0;
  return `<div class=&quot;vpbcard ${proj?'proj':''}&quot;><h3>${titel}</h3><div class=&quot;winst&quot;>Belastbare winst (indicatief): <b>${eur0(w)}</b> ${winstlbl}</div>
    <div class=&quot;vpbrow&quot;><span>19% over ${eur0(Math.min(w,P.grens))}</span><span>${eur(v.laag)}</span></div>
    <div class=&quot;vpbrow&quot;><span>25,8% over ${eur0(Math.max(w-P.grens,0))}</span><span>${eur(v.hoog)}</span></div>
    <div class=&quot;vpbrow tot&quot;><span>Geschatte VPB</span><span>${eur(v.tot)}</span></div>
    <div class=&quot;vpbrow&quot; style=&quot;border:none&quot;><span class=&quot;eff&quot;>effectief tarief</span><span class=&quot;eff&quot;>${eff.toFixed(1)}%</span></div>
    <div class=&quot;vpbrow&quot; style=&quot;border:none&quot;><span class=&quot;eff&quot;>resultaat na belasting</span><span class=&quot;eff&quot;>${eur0(w-v.tot)}</span></div></div>`;
}
document.getElementById('vpb').innerHTML=
  vpbCard('Stand t/m Q2','(resultaat eerste halfjaar)',wJaar,false)+
  vpbCard('Projectie heel jaar 2026','(H1 × 2, geannualiseerd)',wProj,true);

document.getElementById('note').innerHTML=`<h3>Kanttekeningen bij de VPB-inschatting</h3><ul>
 <li><b>Afschrijvingen ontbreken nog:</b> in de mutaties zit geen afschrijvingskostenrekening — de afschrijvingslast wordt vermoedelijk pas bij de jaarafsluiting geboekt. Dit verlaagt het uiteindelijke resultaat en dus de VPB; de inschatting is daardoor aan de hoge kant.</li>
 <li><b>Commercieel ≠ fiscaal resultaat:</b> de belastbare winst kan afwijken door niet- of beperkt aftrekbare kosten (o.a. boetes 4510/4757, gemengde kosten zoals representatie, relatiegeschenken en kantine) en fiscale faciliteiten (investeringsaftrek/KIA, fiscale afschrijving, eventuele verliesverrekening).</li>
 <li><b>Jaarprojectie = H1 × 2:</b> een grove annualisatie zonder seizoenscorrectie (bv. vakantiegeld, dat grotendeels al in Q2 is geboekt). Q2 is bovendien nog niet afgesloten (export 27-6-2026).</li>
 <li><b>Tarief 2026:</b> 19% tot € 200.000 en 25,8% daarboven (bron: Belastingdienst). Dit is een rekenkundige indicatie, geen fiscaal advies — laat de definitieve VPB door je accountant/adviseur bepalen.</li></ul>`;
</script>

<script>
const titles={db:"Doorbelasting materieel 2026 <span>Equipment \u2192 Technics</span>",dt:"Openstaande verkoopfacturen <span>Debiteuren &amp; aanmaningen</span>",bt:"Omzetbelasting Equipment B.V. <span>Btw-aangifte 2026</span>",tt:"Omzetbelasting AAB Technics B.V. <span>Btw-aangifte 2026 \u00b7 met verleggingscontroles</span>",rt:"Resultaat & VPB AAB Technics B.V. <span>Resultatenoverzicht 2026</span>"};
const keys=["db", "dt", "bt", "tt", "rt"];
function open_(k){
  const src=document.getElementById('src_'+k).getAttribute('srcdoc');
  const f=document.getElementById('frame'); f.setAttribute('srcdoc',src);
  document.getElementById('vtitle').innerHTML=titles[k];
  document.getElementById('home').style.display='none';
  document.getElementById('view').classList.add('on');
  if(location.hash!=='#'+k) history.pushState({k},'', '#'+k);
  window.scrollTo(0,0);
}
function home_(){
  document.getElementById('view').classList.remove('on');
  document.getElementById('frame').removeAttribute('srcdoc');
  document.getElementById('home').style.display='flex';
  if(location.hash) history.pushState({},'',location.pathname);
}
window.addEventListener('popstate',()=>{const k=(location.hash||'').replace('#','');keys.includes(k)?open_(k):home_();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('view').classList.contains('on'))home_();});
(function(){const k=(location.hash||'').replace('#','');if(keys.includes(k))open_(k);})();
</script>
